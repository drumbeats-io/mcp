name: Feature request
description: Suggest a tool, capability, or improvement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The tool or behavior you would like. If it is a new tool, what should it do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.
    validations:
      required: false
